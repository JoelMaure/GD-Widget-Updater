name: Actualizar GD Discord Widget

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-widget:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar recolección de estadísticas
        run: python update_stats.py

      - name: Hacer commit y push local
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add current_gd_stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: actualización automática de stats GD" && git push)

      - name: Sincronizar dinámicamente con Discord
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          # Extraemos las variables del JSON generado por Python
          STARS=$(jq '.stars' current_gd_stats.json)
          MOONS=$(jq '.moons' current_gd_stats.json)
          DEMONS=$(jq '.demons' current_gd_stats.json)
          DIAMONDS=$(jq '.diamonds' current_gd_stats.json)
          COINS=$(jq '.user_coins' current_gd_stats.json)
          EXTREME=$(jq '.extreme_demons' current_gd_stats.json)

          # Enviamos los datos usando la variable de entorno protegida
          curl -X PUT "https://discord.com/api/v10/users/654470361634832387/applications/1520850043882700881/role-connection" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bot $BOT_TOKEN" \
               -H "User-Agent: DiscordBot (https://github.com/discord/discord-api-docs, 1.0.0)" \
               -d "{
                 \"platform_username\": \"RazorLuL\",
                 \"metadata\": {
                   \"stars\": $STARS,
                   \"moons\": $MOONS,
                   \"demons\": $DEMONS,
                   \"diamonds\": $DIAMONDS,
                   \"user_coins\": $COINS,
                   \"extreme_demons\": $EXTREME
                 }
               }"
