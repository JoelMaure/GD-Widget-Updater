name: Actualizar GD Discord Widget

on:
  schedule:
    # Cron: Ejecutar a cada hora en punto (minuto 0)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite ejecutar la acción manualmente mediante un botón

jobs:
  update-widget:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requerido para hacer push
      
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar recolección de estadísticas
        run: python update_stats.py

      - name: Hacer commit y push de las estadísticas actualizadas
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add current_gd_stats.json
          # Comprueba si hay cambios antes de comitear
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: actualización automática de stats GD" && git push)
