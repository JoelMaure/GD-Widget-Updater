name: Actualizar GD Discord Widget

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-widget:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar sincronización de estadísticas
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python update_stats.py

      - name: Hacer commit y push de cambios locales
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add current_gd_stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: actualización automática de stats GD" && git push)
